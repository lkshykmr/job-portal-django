{% extends 'base.html' %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h2>
            Apply For {{ job.title }}
        </h2>

        <form
            method="post"
            enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary">

                Submit Application

            </button>

        </form>

    </div>

</div>

{% endblock %}
